services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data
    environment:
      DATABASE_URL: sqlite+aiosqlite:///./data/knowledge.db
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:8000
    depends_on:
      - backend
